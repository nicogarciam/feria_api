name: Deploy Laravel Backend to Alwaysdata

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Laravel backend to /home/feriar/www/app/
        uses: easingthemes/ssh-deploy@main
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_host: ${{ secrets.REMOTE_HOST }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_port: 22
          args: "-rlgoDzvc -i --delete"
          source: "./"      # Si tu Laravel está en la raíz del repositorio. Si está en subcarpeta, cámbialo (ej: "laravel/")
          target: "/home/feriar/www/app/"
          exclude: |
            /node_modules/
            /vendor/
            /.env
            /.env.*
            /storage/
            /tests/
            /.git/
            /.github/
            /.gitignore
            /phpunit.xml
            /README.md
            /composer.lock
            /package.json
            /package-lock.json
            /webpack.mix.js
            /vite.config.js
            /.editorconfig
            /.phpunit.cache/
            /docker-compose.yml
            /Dockerfile
            /.docker/
            /.idea/
            
      - name: Post-deploy Laravel commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/feriar/www/app
            composer install --no-dev --optimize-autoloader
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
            chmod -R 775 storage bootstrap/cache

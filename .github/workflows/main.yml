name: Deploy to Alwaysdata

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Desplegar backend Laravel en /home/feriar/www/app/
      #    Se excluyen archivos y carpetas que no deben subirse
      - name: Deploy backend (Laravel) to app folder
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"        # --delete elimina archivos obsoletos en el servidor
          SOURCE: "./"                   # Cambia al directorio donde está tu Laravel (ej: "backend/", "./")
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/home/feriar/www/app/"
          EXCLUDE: |
            /vendor/
            /.env
            /.env.*
            /storage/
            /tests/
            /.git/
            /.github/
            /.gitignore
            /phpunit.xml
            /README.md
            /composer.lock
            /package.json
            /package-lock.json
            /webpack.mix.js
            /vite.config.js
            /.editorconfig
            /.phpunit.cache/
            /docker-compose.yml
            /Dockerfile
            /.docker/
            /.idea/

      # 6. Comandos post-despliegue (instalar dependencias, migraciones, etc.)
      - name: Post-deploy Laravel commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/feriar/www/app
            # Instalar dependencias de Composer (sin desarrollo)
            composer install --no-dev --optimize-autoloader
            # Limpiar y cachear configuraciones
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
            chmod -R 775 storage bootstrap/cache
